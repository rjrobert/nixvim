name: Update flake.lock

on:
  schedule:
    # Monday 9 AM UTC = 1 AM PST / midnight PDT
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake.lock
        id: update-flake
        uses: DeterminateSystems/update-flake-lock@main
        with:
          commit-msg: "chore: update flake.lock"
          token: ${{ steps.app-token.outputs.token }}

      - name: Auto-merge PR
        if: steps.update-flake.outputs.pull-request-number
        run: gh pr merge ${{ steps.update-flake.outputs.pull-request-number }} --merge --delete-branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
